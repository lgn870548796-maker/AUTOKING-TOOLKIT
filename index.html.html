<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOKING — 出口工具箱</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;background:#eef1f6;min-height:100vh;}

/* ===== SHELL ===== */
.shell{display:flex;flex-direction:column;min-height:100vh;}

/* ===== HEADER ===== */
.header{background:#0a3d7c;padding:0 32px;display:flex;align-items:stretch;justify-content:space-between;box-shadow:0 2px 8px rgba(10,61,124,0.22);}
.brand{display:flex;flex-direction:column;justify-content:center;padding:14px 0;}
.ak-word{font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:700;letter-spacing:0.22em;color:#fff;text-transform:uppercase;border-bottom:2px solid rgba(255,255,255,0.35);padding-bottom:2px;line-height:1;}
.ak-tag{font-size:7.5px;color:rgba(255,255,255,0.55);letter-spacing:0.14em;text-transform:uppercase;margin-top:4px;}

/* ===== TABS ===== */
.tabs{display:flex;align-items:flex-end;gap:4px;padding-bottom:0;}
.tab{display:flex;align-items:center;gap:7px;padding:13px 22px 11px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);cursor:pointer;border-radius:8px 8px 0 0;border:none;background:none;transition:all 0.18s;letter-spacing:0.02em;border-bottom:3px solid transparent;user-select:none;}
.tab:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.07);}
.tab.active{color:#fff;background:rgba(255,255,255,0.12);border-bottom:3px solid #5ba3f5;}
.tab-icon{font-size:15px;}
.header-date{display:flex;align-items:center;font-size:11px;color:rgba(255,255,255,0.45);padding:14px 0;}

/* ===== PAGE CONTAINERS ===== */
.page{display:none;}
.page.active{display:block;}

/* ===== QUOTATION CALCULATOR STYLES ===== */
.qc-wrap{max-width:860px;margin:0 auto;padding:22px 16px;display:flex;flex-direction:column;gap:14px;}
.card{background:#fff;border-radius:10px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#0a3d7c;margin-bottom:14px;padding-bottom:8px;border-bottom:1.5px solid #e8edf5;display:flex;align-items:center;gap:7px;}
.rate-area{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.rate-label{font-size:12px;font-weight:600;color:#333;white-space:nowrap;}
.rate-input{width:130px;font-size:20px;font-weight:700;font-family:'Courier New',monospace;border-radius:7px;border:2px solid #0a3d7c;padding:8px 12px;color:#0a3d7c;text-align:center;transition:box-shadow 0.15s;}
.rate-input:focus{outline:none;box-shadow:0 0 0 3px rgba(10,61,124,0.13);}
.rate-input.empty{border-color:#d4a000;color:#d4a000;}
.boc-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:#0a3d7c;text-decoration:none;background:#eef4ff;border:1px solid #c0d4f5;border-radius:7px;padding:8px 14px;white-space:nowrap;transition:background 0.15s;}
.boc-link:hover{background:#ddeaff;}
.rate-guide{font-size:10px;color:#aaa;line-height:1.7;}
.rate-warn{font-size:11px;color:#c07000;background:#fffbe6;border:1px solid #f0d060;border-radius:6px;padding:6px 12px;display:none;margin-top:8px;}
.qfg{display:flex;flex-direction:column;gap:5px;}
.qfg label{font-size:11px;color:#666;font-weight:600;letter-spacing:0.02em;}
.qfg input{font-size:13px;border-radius:7px;border:1px solid #ddd;padding:8px 10px;width:100%;transition:border-color 0.15s,box-shadow 0.15s;color:#1c1c1c;}
.qfg input:focus{outline:none;border-color:#0a3d7c;box-shadow:0 0 0 2px rgba(10,61,124,0.09);}
.qfg .readonly{background:#f5f7fa;color:#888;cursor:default;border-color:#e8e8e8;}
.qfg .hint{font-size:10px;color:#bbb;}
.qgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.qgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.fee-toggle-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;cursor:pointer;user-select:none;margin-bottom:10px;}
.fee-toggle-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#0a3d7c;}
.fee-default-badge{font-size:10px;background:#f0f5ff;color:#0a3d7c;border-radius:4px;padding:2px 9px;border:0.5px solid #c0d4f5;}
.fee-custom-box{display:flex;gap:14px;padding:12px 14px;background:#f7f9fc;border-radius:7px;border:1px solid #e0e8f5;}
.pct-row{display:flex;align-items:center;gap:6px;}
.pct-row input{width:70px !important;text-align:center;font-family:'Courier New',monospace;font-weight:600;}
.pct-row span{font-size:13px;color:#666;}
.detail-block{margin-bottom:14px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;font-size:11.5px;}
.detail-row:not(:last-child){border-bottom:1px solid #f5f5f5;}
.dl{color:#555;}.dl small{font-size:10px;color:#bbb;margin-left:6px;}
.dr{font-family:'Courier New',monospace;font-weight:600;font-size:12px;color:#333;text-align:right;}
.dr.neg{color:#c0392b;}.dr.pos{color:#1a7a1a;}.dr.cost{color:#0a3d7c;font-size:13px;}
.divider-line{height:1px;background:#eef1f6;margin:4px 0;}
.fob-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fob-card{border-radius:8px;padding:14px 16px;}
.fob-card.blue{background:#eef4ff;border:1.5px solid #0a3d7c;}
.fob-card.green{background:#f0faf0;border:1.5px solid #1a7a1a;}
.fob-card-label{font-size:9px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;margin-bottom:6px;}
.fob-card.blue .fob-card-label{color:#0a3d7c;}.fob-card.green .fob-card-label{color:#1a7a1a;}
.fob-card-val{font-size:22px;font-weight:700;font-family:'Courier New',monospace;}
.fob-card.blue .fob-card-val{color:#0a3d7c;}.fob-card.green .fob-card-val{color:#1a7a1a;}
.fob-card-sub{font-size:10px;color:#aaa;margin-top:3px;}
.client-block{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;background:#fff8ee;border:1.5px solid #f0c87a;flex-wrap:wrap;}
.client-label{font-size:11px;color:#8a5500;flex:1;min-width:160px;font-weight:500;}
.client-input{width:140px;font-size:15px;font-weight:700;border-radius:7px;border:1.5px solid #f0c87a;padding:7px 10px;font-family:'Courier New',monospace;color:#c07000;text-align:center;}
.client-input:focus{outline:none;border-color:#c07000;box-shadow:0 0 0 2px rgba(192,112,0,0.12);}
.client-result{font-size:12px;font-weight:700;font-family:'Courier New',monospace;text-align:right;min-width:150px;}
.pdf-btn{width:100%;background:#0a3d7c;color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.04em;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.15s;}
.pdf-btn:hover{opacity:0.87;}.pdf-btn:disabled{opacity:0.3;pointer-events:none;}

/* ===== PI GENERATOR STYLES ===== */
.pi-wrap{display:flex;height:calc(100vh - 58px);}
.sidebar{width:300px;min-width:300px;border-right:1px solid #e0e0e0;padding:14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;background:#fff;}
.preview-panel{flex:1;padding:20px;background:#eef1f6;overflow:auto;display:flex;justify-content:center;align-items:flex-start;}
.sec-label{font-size:10px;font-weight:700;color:#0a3d7c;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
.pfg{display:flex;flex-direction:column;gap:3px;}
.pfg label{font-size:11px;color:#666;}
.pfg input,.pfg textarea{font-size:12px;width:100%;border-radius:6px;border:1px solid #ddd;padding:5px 8px;color:#1c1c1c;}
.pfg input:focus,.pfg textarea:focus{outline:none;border-color:#0a3d7c;}
.pfg textarea{resize:vertical;min-height:50px;}
.pdivider{border:none;border-top:1px solid #eee;margin:2px 0;}
.cn-box{background:#f5f7fa;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:7px;}
.cn-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.cn-preview{font-size:11px;font-family:'Courier New',monospace;color:#0a3d7c;background:#eef4ff;padding:5px 10px;border-radius:5px;letter-spacing:0.03em;text-align:center;border:0.5px solid #c0d4f5;}
.item-row{background:#f5f7fa;border-radius:7px;padding:9px;display:flex;flex-direction:column;gap:5px;position:relative;}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.rm-btn{position:absolute;top:7px;right:7px;background:none;border:none;color:#bbb;cursor:pointer;font-size:14px;padding:0;line-height:1;}
.rm-btn:hover{color:#c0392b;}
.add-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:#0a3d7c;background:none;border:1px dashed #b8d0f5;border-radius:6px;padding:7px 10px;cursor:pointer;width:100%;justify-content:center;}
.add-btn:hover{background:#eef4ff;}
.items-list{display:flex;flex-direction:column;gap:6px;}
.action-btns{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.gen-btn{background:#0a3d7c;color:#fff;border:none;border-radius:7px;padding:9px;font-size:13px;font-weight:500;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;}
.gen-btn:hover{opacity:0.85;}
.prt-btn{background:none;border:1px solid #ddd;border-radius:7px;padding:8px;font-size:12px;cursor:pointer;color:#555;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;}
.prt-btn:hover{background:#f5f5f5;}

/* PI Document */
.pi{width:720px;min-width:720px;background:#fff;color:#1c1c1c;padding:46px 54px 40px;border-radius:4px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:9px;line-height:1.55;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.pi-ak-word{font-family:Georgia,'Times New Roman',serif;font-size:19px;font-weight:700;letter-spacing:0.22em;color:#0a3d7c;text-transform:uppercase;border-bottom:2.5px solid #1a6cb5;padding-bottom:1px;line-height:1;}
.pi-ak-tagline{font-size:7px;color:#7a9cbe;letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;}
.pi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;}
.pi-seller-name{font-size:9.5px;font-weight:700;color:#1c1c1c;letter-spacing:0.02em;margin-bottom:4px;}
.pi-seller-detail{font-size:7.5px;color:#888;line-height:1.8;}
.pi-right{text-align:right;}
.pi-doc-title{font-size:18px;font-weight:200;letter-spacing:0.22em;color:#0a3d7c;text-transform:uppercase;margin-bottom:11px;}
.pi-meta-table{font-size:8px;color:#555;text-align:right;border-collapse:collapse;}
.pi-meta-table td{padding:1.8px 0 1.8px 18px;vertical-align:top;}
.pi-ml{color:#bbb;font-weight:400;white-space:nowrap;}.pi-mv{color:#1c1c1c;font-weight:600;}
.pi-rule-dark{border:none;border-top:1.5px solid #0a3d7c;margin:0 0 18px;}
.pi-rule{border:none;border-top:0.5px solid #e0e0e0;margin:0 0 18px;}
.pi-parties{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px;}
.pi-party-lbl{font-size:6.5px;font-weight:700;letter-spacing:0.12em;color:#0a3d7c;text-transform:uppercase;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid #d5e4f5;}
.pi-party-name{font-size:9px;font-weight:700;color:#1c1c1c;margin-bottom:4px;}
.pi-party-info{font-size:7.5px;color:#777;line-height:1.75;}
.pi-tbl{width:100%;border-collapse:collapse;margin-bottom:16px;}
.pi-tbl thead tr{border-bottom:1px solid #0a3d7c;}
.pi-tbl th{font-size:6.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#0a3d7c;padding:0 8px 7px 0;text-align:left;}
.pi-tbl th.r{text-align:right;padding-right:0;}
.pi-tbl td{padding:7.5px 8px 7.5px 0;border-bottom:0.5px solid #f0f0f0;font-size:8.5px;color:#333;vertical-align:top;}
.pi-tbl td.r{text-align:right;padding-right:0;font-family:'Courier New',monospace;color:#1c1c1c;font-size:8px;}
.pi-tbl tbody tr:last-child td{border-bottom:none;}
.pi-m-name{font-weight:700;color:#1c1c1c;font-size:8.5px;}.pi-m-spec{font-size:7px;color:#aaa;margin-top:2px;}
.pi-totals-wrap{display:flex;justify-content:flex-end;margin-bottom:20px;}
.pi-totals{width:210px;}
.pi-t-row{display:flex;justify-content:space-between;align-items:center;padding:3.5px 0;font-size:8px;color:#888;border-bottom:0.5px solid #f5f5f5;}
.pi-t-row:last-child{border-bottom:none;}
.pi-t-row.grand{margin-top:7px;padding-top:9px;border-top:1.5px solid #0a3d7c;font-size:10.5px;font-weight:700;color:#0a3d7c;}
.pi-terms-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;padding:12px 14px;background:#f3f7fc;border-radius:3px;border-left:3px solid #1a6cb5;}
.pi-term-lbl{font-size:6.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#7a9cbe;margin-bottom:3px;}
.pi-term-val{font-size:8px;color:#1c1c1c;font-weight:600;}
.pi-bank-wrap{border:0.5px solid #d5e4f5;border-radius:3px;padding:12px 14px;margin-bottom:18px;background:#fafcff;}
.pi-bank-hd{font-size:6.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#0a3d7c;margin-bottom:9px;}
.pi-bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 22px;}
.pi-b-row{font-size:7.5px;padding:2px 0;}
.pi-b-lbl{color:#bbb;}.pi-b-val{color:#1c1c1c;font-weight:600;}
.pi-remarks-wrap{margin-bottom:18px;font-size:8px;color:#555;padding:9px 14px;border-left:2px solid #1a6cb5;background:#f8fbff;border-radius:0 3px 3px 0;}
.pi-footer-doc{display:flex;justify-content:space-between;align-items:flex-end;padding-top:16px;border-top:0.5px solid #e0e0e0;}
.pi-footer-note{font-size:7px;color:#bbb;line-height:1.9;max-width:260px;}
.pi-sig-block{text-align:center;}
.pi-sig-line{width:140px;border-bottom:0.5px solid #999;height:38px;margin:0 auto 5px;}
.pi-sig-lbl{font-size:7px;color:#aaa;line-height:1.7;}
</style>
</head>
<body>
<div class="shell">

  <!-- ===== HEADER ===== -->
  <div class="header">
    <div class="brand">
      <div class="ak-word">AUTOKING</div>
      <div class="ak-tag">Global Automotive Export</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('qc')" id="tab-qc">
        <span class="tab-icon">🧮</span> 报价计算器
      </button>
      <button class="tab" onclick="switchTab('pi')" id="tab-pi">
        <span class="tab-icon">📄</span> 形式发票生成器
      </button>
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>

  <!-- ===== PAGE: QUOTATION CALCULATOR ===== -->
  <div class="page active" id="page-qc">
    <div class="qc-wrap">

      <div class="card">
        <div class="card-title">💱 汇率设置</div>
        <div class="rate-area">
          <span class="rate-label">中行现汇买入价（USD）</span>
          <input type="number" class="rate-input" id="rateInput" placeholder="—" step="0.0001" min="1" oninput="onRateInput()">
          <a class="boc-link" href="https://srh.bankofchina.com/search/whpj/search_cn.jsp" target="_blank">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            查询中国银行外汇牌价
          </a>
          <div class="rate-guide">打开链接 → 找"美元"行 → 复制<strong>现汇买入价</strong>填入左侧</div>
        </div>
        <div class="rate-warn" id="rateWarn">⚠ 请先输入当日汇率</div>
      </div>

      <div class="card">
        <div class="card-title">🚗 车辆信息</div>
        <div class="qgrid2" style="margin-bottom:12px;">
          <div class="qfg"><label>车型名称</label><input type="text" id="carName" placeholder="如：吉利缤越 2025款 1.5T DCT"></div>
          <div class="qfg"><label>颜色 / 备注</label><input type="text" id="carColor" placeholder="如：星空灰 / 顶配"></div>
        </div>
        <div class="qgrid3">
          <div class="qfg"><label>厂商指导价（元）</label><input type="number" id="guidePrice" placeholder="101800" oninput="calc()"></div>
          <div class="qfg"><label>优惠金额（元）</label><input type="number" id="discount" placeholder="17000" oninput="calc()"></div>
          <div class="qfg"><label>优惠后价格（元）</label><input type="number" id="discountedPrice" class="readonly" readonly></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">⚙️ 费用设置</div>
        <label class="fee-toggle-row">
          <input type="checkbox" id="customFeeCheck" onchange="toggleFee()">
          自定义手续费
          <span class="fee-default-badge">默认：优惠后价格 × 3.5% + ¥1,000</span>
        </label>
        <div id="feeCustom" style="display:none;" class="fee-custom-box">
          <div class="qfg" style="width:130px;">
            <label>手续费比例</label>
            <div style="display:flex;align-items:center;gap:5px;">
              <input type="number" id="feeRate" value="3.5" step="0.1" min="0" oninput="calc()" style="width:80px;">
              <span style="font-size:13px;color:#888;">%</span>
            </div>
          </div>
          <div class="qfg" style="width:150px;">
            <label>固定金额（元）</label>
            <input type="number" id="feeFixed" value="1000" oninput="calc()">
          </div>
        </div>
        <div class="qgrid3" style="margin-top:14px;">
          <div class="qfg"><label>国内运费（元）</label><input type="number" id="freightCN" value="500" oninput="calc()"><span class="hint">工厂 → 港口</span></div>
          <div class="qfg"><label>港杂费（元）</label><input type="number" id="portFee" value="2500" oninput="calc()"></div>
          <div class="qfg">
            <label>自定义利润率</label>
            <div class="pct-row"><input type="number" id="customPct" value="7" step="0.5" min="0" max="100" oninput="calc()"><span>%</span></div>
            <span class="hint">右侧 FOB 报价使用此利润率</span>
          </div>
        </div>
      </div>

      <div class="card" id="resultCard" style="display:none;">
        <div class="card-title">📊 报价结果</div>
        <div class="detail-block" id="detailBlock"></div>
        <div class="fob-grid" id="fobGrid"></div>
        <div class="client-block">
          <span class="client-label">🎯 输入给客户的报价（USD）— 反算实际利润率</span>
          <input type="number" class="client-input" id="clientPrice" placeholder="0.00" oninput="calcClient()">
          <div class="client-result" id="clientResult">—</div>
        </div>
      </div>

      <button class="pdf-btn" id="pdfBtn" onclick="exportPDF()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出报价单 PDF
      </button>
    </div>
  </div>

  <!-- ===== PAGE: PI GENERATOR ===== -->
  <div class="page" id="page-pi">
    <div class="pi-wrap">
      <div class="sidebar">
        <div class="cn-box">
          <div class="sec-label">Contract Number</div>
          <div class="cn-row">
            <div class="pfg"><label>Date (YYYYMMDD)</label><input type="text" id="cnDate" maxlength="8" placeholder="20260515" oninput="updateCN()"></div>
            <div class="pfg"><label>Seq. No.</label><input type="number" id="cnSeq" value="1" min="1" max="999" oninput="updateCN()"></div>
          </div>
          <div class="cn-preview" id="cnDisplay">AT06-20260515001</div>
        </div>

        <hr class="pdivider">
        <div class="sec-label">Buyer</div>
        <div class="pfg"><label>Company name</label><input type="text" id="buyerName" placeholder="ABC Trading Co., Ltd." oninput="rp()"></div>
        <div class="pfg"><label>Address</label><textarea id="buyerAddr" placeholder="Full address..." oninput="rp()"></textarea></div>

/* ========== QUOTATION CALCULATOR ========== */
function getRate(){ return parseFloat(document.getElementById('rateInput').value)||0; }

  const v=getRate();

  document.getElementById('rateWarn').style.display='none';
  calc();
}

function toggleFee(){
  document.getElementById('feeCustom').style.display=document.getElementById('customFeeCheck').checked?'flex':'none';
  calc();
}

function fmt(n,d=2){ return isNaN(n)||!isFinite(n)?'--':n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }

let R=null;

function calc(){
  const rate=getRate();
  const guide=parseFloat(document.getElementById('guidePrice').value)||0;
  const disc=parseFloat(document.getElementById('discount').value)||0;
  const discounted=guide-disc;
  document.getElementById('discountedPrice').value=discounted>0?discounted:'';
  if(discounted<=0||rate<=0){
    document.getElementById('resultCard').style.display='none';
    document.getElementById('pdfBtn').disabled=true;
    if(discounted>0&&rate<=0){document.getElementById('rateWarn').style.display='block';document.getElementById('rateInput').classList.add('empty');}
    return;
  }
  document.getElementById('rateWarn').style.display='none';
  const custom=document.getElementById('customFeeCheck').checked;
  const feeRate=custom?(parseFloat(document.getElementById('feeRate').value)||3.5):3.5;
  const feeFixed=custom?(parseFloat(document.getElementById('feeFixed').value)||1000):1000;
  const fee=discounted*feeRate/100+feeFixed;
  const taxRefund=discounted/1.13*0.13;
  const freightCN=parseFloat(document.getElementById('freightCN').value)||0;
  const portFee=parseFloat(document.getElementById('portFee').value)||0;
  const customPct=parseFloat(document.getElementById('customPct').value)||7;
  const costRMB=discounted-taxRefund+fee+freightCN+portFee;
  const costUSD=costRMB/rate;
  const fob4=costUSD/0.96;
  const fobX=costUSD/(1-customPct/100);
  R={guide,disc,discounted,rate,feeRate,feeFixed,fee,taxRefund,freightCN,portFee,costRMB,costUSD,fob4,fobX,customPct};
  document.getElementById('detailBlock').innerHTML=`

    <div class="detail-row"><span class="dl">国内运费 + 港杂费</span><span class="dr pos">+ ¥ ${fmt(freightCN+portFee)}</span></div>
    <div class="divider-line"></div>
    <div class="detail-row" style="background:#f5f8ff;border-radius:6px;margin:4px 0;">

    </div>`;

    <div class="fob-card blue"><div class="fob-card-label">FOB 报价 · 利润率 4%</div><div class="fob-card-val">$ ${fmt(fob4)}</div><div class="fob-card-sub">成本 ÷ 0.96</div></div>
    <div class="fob-card green"><div class="fob-card-label">FOB 报价 · 利润率 ${customPct}%</div><div class="fob-card-val">$ ${fmt(fobX)}</div><div class="fob-card-sub">成本 ÷ ${(1-customPct/100).toFixed(2)}</div></div>`;
  document.getElementById('resultCard').style.display='block';
  document.getElementById('pdfBtn').disabled=false;
  document.getElementById('clientPrice').value='';
  document.getElementById('clientResult').textContent='—';
}

function calcClient(){
  if(!R)return;

  const margin=(cp-R.costUSD)/cp*100;
